<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>创建个人资料</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#2563EB", // Blue from the progress bar
            "background-light": "#FFFFFF",
            "background-dark": "#121212",
          },
          fontFamily: {
            display: ["-apple-system", "BlinkMacSystemFont", "Segoe UI", "Roboto", "Helvetica Neue", "Arial", "sans-serif"],
          },
          borderRadius: {
            DEFAULT: "1.5rem",
          },
        },
      },
    };
  </script>
<style>
    body {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-800 dark:text-slate-200">
<div class="flex flex-col h-screen max-w-md mx-auto p-6">
<main class="flex flex-col flex-grow">
<div class="text-center pt-8">
<h1 class="text-2xl font-bold text-slate-900 dark:text-white">开启你的约会盲盒之旅!</h1>
</div>
<div class="my-8">
<div class="relative w-full bg-slate-200 dark:bg-slate-700 rounded-full h-2">
<div class="bg-primary h-2 rounded-full" style="width: 50%;"></div>
<div class="absolute -top-6 -right-5 transform -translate-x-1/2">
<div class="bg-primary text-white text-xs font-semibold px-2 py-1 rounded-md">
              50%
            </div>
</div>
</div>
</div>
<div class="flex justify-center mb-8">
<button class="relative w-36 h-36 rounded-full border-2 border-slate-200 dark:border-slate-600 bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-500 dark:text-slate-400 group">
<div class="text-center">
<span class="material-symbols-outlined text-4xl text-slate-400 dark:text-slate-500 group-hover:text-primary transition-colors">add_a_photo</span>
<p class="text-lg">头像</p>
</div>
</button>
</div>
<form class="space-y-6">
<div class="flex items-center">
<label class="w-20 text-md text-slate-600 dark:text-slate-400" for="nickname">昵称</label>
<input class="flex-1 bg-transparent border border-slate-300 dark:border-slate-600 rounded-full py-2 px-4 focus:ring-primary focus:border-primary" id="nickname" type="text"/>
</div>
<div class="flex items-center">
<label class="w-20 text-md text-slate-600 dark:text-slate-400" for="age">年龄</label>
<input class="flex-1 bg-transparent border border-slate-300 dark:border-slate-600 rounded-full py-2 px-4 focus:ring-primary focus:border-primary" id="age" type="number"/>
</div>
<div class="flex items-center">
<label class="w-20 text-md text-slate-600 dark:text-slate-400" for="height">身高</label>
<input class="flex-1 bg-transparent border border-slate-300 dark:border-slate-600 rounded-full py-2 px-4 focus:ring-primary focus:border-primary" id="height" type="text"/>
</div>
<div class="flex items-center">
<label class="w-20 text-md text-slate-600 dark:text-slate-400">常驻地</label>
<div class="flex-1 grid grid-cols-3 gap-2">
<button class="w-full text-center py-2 border border-slate-300 dark:border-slate-600 rounded-full text-slate-600 dark:text-slate-300 hover:border-primary hover:text-primary dark:hover:border-primary dark:hover:text-primary transition-colors" type="button">省份</button>
<button class="w-full text-center py-2 border border-slate-300 dark:border-slate-600 rounded-full text-slate-600 dark:text-slate-300 hover:border-primary hover:text-primary dark:hover:border-primary dark:hover:text-primary transition-colors" type="button">城市</button>
<button class="w-full text-center py-2 border border-slate-300 dark:border-slate-600 rounded-full text-slate-600 dark:text-slate-300 hover:border-primary hover:text-primary dark:hover:border-primary dark:hover:text-primary transition-colors" type="button">地区</button>
</div>
</div>
<div class="flex items-center">
<label class="w-20 text-md text-slate-600 dark:text-slate-400">性别</label>
<div class="flex-1 grid grid-cols-2 gap-2">
<button class="w-full text-center py-2 border border-slate-300 dark:border-slate-600 rounded-full text-slate-600 dark:text-slate-300 focus:bg-primary focus:text-white focus:border-primary transition-colors" type="button">男</button>
<button class="w-full text-center py-2 border border-slate-300 dark:border-slate-600 rounded-full text-slate-600 dark:text-slate-300 focus:bg-primary focus:text-white focus:border-primary transition-colors" type="button">女</button>
</div>
</div>
</form>
<div class="mt-auto pt-8 pb-4">
<button class="w-full py-4 bg-primary text-white text-lg font-semibold rounded-full hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 dark:focus:ring-offset-background-dark transition-colors">
          下一步
        </button>
</div>
</main>
</div>

</body></html>
