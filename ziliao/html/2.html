<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生成你的专属头像</title>

<style>
    body {
        margin: 0;
        padding-bottom: 40px;
        background: #f3f3f3;
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial;
    }

    /* 顶部导航 */
    .nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 20px 10px;
    }
    .nav-left {
        display: flex;
        align-items: center;
        gap: 12px;
    }
    .nav-time {
        font-size: 18px;
        font-weight: 500;
    }
    .back-btn {
        width: 22px;
        height: 22px;
    }

    .nav-right {
        display: flex;
        align-items: center;
        gap: 10px;
        background: #fff;
        border: 1.5px solid #ddd;
        border-radius: 20px;
        padding: 6px 12px;
    }
    .dot {
        width: 10px;
        height: 10px;
        background: #000;
        border-radius: 50%;
    }
    .dot-hollow {
        width: 12px;
        height: 12px;
        border: 2px solid #000;
        border-radius: 50%;
    }

    /* 中间标题 */
    .header-title {
        text-align: center;
        font-size: 20px;
        font-weight: 600;
        margin-top: -10px;
        margin-bottom: 8px;
    }

    /* 主展示区域 */
    .main-card {
        width: 90%;
        margin: 10px auto 16px;
        background: linear-gradient(to bottom, #ffffff, #ffecec);
        padding: 20px;
        border-radius: 26px;
    }

    .main-image-container {
        width: 100%;
        border-radius: 26px;
        overflow: hidden;
    }
    .main-image {
        width: 100%;
        display: block;
    }

    /* 按钮区域 */
    .action-row {
        margin-top: 14px;
        display: flex;
        align-items: center;
        gap: 18px;
    }
    .circle-btn {
        width: 46px;
        height: 46px;
        background: #fff;
        border-radius: 50%;
        border: 1.5px solid #ddd;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 20px;
        cursor: pointer;
    }

    .switch-btn {
        flex: 1;
        height: 46px;
        background: #fff;
        border: 1.5px solid #ddd;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 15px;
        cursor: pointer;
    }
    .switch-btn img {
        width: 18px;
        height: 18px;
    }

    /* 头像选择 */
    .avatar-list {
        margin-top: 20px;
        display: flex;
        justify-content: center;
        gap: 26px;
    }
    .avatar-item {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        overflow: hidden;
        border: 4px solid transparent;
        cursor: pointer;
    }
    .avatar-item.active {
        border-color: black;
    }
    .avatar-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* 底部按钮区域 */
    .bottom-btns {
        width: 90%;
        margin: 40px auto 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
    }

    .save-btn {
        width: 40%;
        background: #e74b4b;
        color: white;
        height: 54px;
        font-size: 16px;
        border-radius: 14px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 6px;
        cursor: pointer;
    }
    .save-btn img {
        width: 18px;
        height: 18px;
    }

    .confirm-btn {
        flex: 1;
        height: 54px;
        background: #000;
        color: #fff;
        border-radius: 14px;
        font-size: 17px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
    }

    /* iPhone home bar 占位 */
    .safe-area {
        width: 100%;
        height: 30px;
    }
</style>
</head>

<body>

<!-- 顶部导航 -->
<div class="nav">
    <div class="nav-left">
        <img src="icon-back.png" class="back-btn">
        <div class="nav-time">9:27</div>
    </div>

    <div class="nav-right">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot-hollow"></div>
    </div>
</div>

<!-- 标题 -->
<div class="header-title">生成你的专属头像</div>

<!-- 展示区域 -->
<div class="main-card">

    <div class="main-image-container">
        <img src="main.png" class="main-image">
    </div>

    <div class="action-row">
        <div class="circle-btn">
            <img src="icon-refresh.png" width="22">
        </div>

        <div class="switch-btn">
            <img src="icon-pen.png">
            换张图片
        </div>
    </div>

</div>

<!-- 底部头像列表 -->
<div class="avatar-list">
    <div class="avatar-item active">
        <img src="avatar1.png" class="avatar-img">
    </div>
    <div class="avatar-item">
        <img src="avatar2.png" class="avatar-img">
    </div>
</div>

<!-- 底部按钮 -->
<div class="bottom-btns">

    <div class="save-btn">
        <img src="icon-download.png">
        保存头像
    </div>

    <div class="confirm-btn">
        选好啦
    </div>

</div>

<!-- iPhone home bar -->
<div class="safe-area"></div>

</body>
</html>
