<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户资料填写</title>
    <style>
        /* 基础样式 */
        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            background-color: #333;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
        }

        /* 手机屏幕模拟 */
        .phone-screen {
            width: 375px; /* Typical mobile width */
            height: 812px; /* Typical mobile height */
            background-color: #fff;
            border-radius: 40px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            overflow-y: scroll;
            position: relative;
            padding-bottom: 30px; /* Space for the bottom gesture bar */
        }

        .phone-screen::-webkit-scrollbar {
            display: none; /* Hide scrollbar for a cleaner look */
        }

        /* 状态栏 (Status Bar) */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px 0;
            position: sticky;
            top: 0;
            background-color: #fff;
            z-index: 10;
        }

        .status-bar-left {
            font-weight: bold;
        }

        .status-bar-right span {
            margin-left: 5px;
        }

        /* 动态岛/刘海屏模拟 */
        .notch {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 25px;
            background-color: #000;
            border-radius: 15px;
            z-index: 10;
        }

        /* 头部和头像 */
        .header {
            text-align: center;
            padding: 50px 0 30px;
            position: relative;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
        }

        .ai-button {
            padding: 5px 15px;
            border: 1px solid #ccc;
            border-radius: 20px;
            background-color: #fff;
            font-size: 14px;
            color: #333;
            cursor: pointer;
            outline: none;
        }

        /* 表单主体 */
        .form-content {
            padding: 0 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 10px;
            font-size: 16px;
            color: #333;
        }

        .form-input {
            width: 100%;
            padding: 10px 0;
            border: none;
            border-bottom: 1px solid #ddd;
            font-size: 16px;
            outline: none;
        }

        /* 地址选择 */
        .location-select {
            display: flex;
            gap: 10px;
        }

        .location-button {
            flex-grow: 1;
            padding: 10px 0;
            border: 1px solid #ccc;
            border-radius: 20px;
            text-align: center;
            background-color: #fff;
            color: #333;
            cursor: pointer;
            font-size: 15px;
        }
        /* 可选：模拟选中状态 */
        .location-button.selected {
             border-color: #007aff;
             color: #007aff;
        }

        /* 性别选择 (Segmented Control) */
        .gender-select {
            display: flex;
            gap: 10px;
        }

        .gender-select input[type="radio"] {
            display: none;
        }

        .gender-select label {
            flex-grow: 1;
            padding: 10px 0;
            border: 1px solid #ccc;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            font-size: 15px;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .gender-select input[type="radio"]:checked + label {
            background-color: #e6e6e6; /* Light gray for selected */
            border-color: #e6e6e6;
            color: #333;
            font-weight: 500;
        }

        /* 目的选择 (Multiple Tags) */
        .purpose-group-header {
            margin-bottom: 5px;
        }

        .purpose-group-header p {
            margin: 0;
            font-size: 13px;
            color: #999;
        }

        .purpose-select {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .purpose-select input[type="checkbox"] {
            display: none;
        }

        .purpose-select label {
            padding: 10px 20px;
            border: 1px solid #ccc;
            border-radius: 20px;
            cursor: pointer;
            font-size: 15px;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .purpose-select input[type="checkbox"]:checked + label {
            background-color: #e6e6e6; /* Light gray for selected */
            border-color: #e6e6e6;
            color: #333;
            font-weight: 500;
        }
        
        /* Note/Disclaimer */
        .disclaimer {
            font-size: 12px;
            color: #999;
            margin-top: 15px;
            line-height: 1.4;
        }

        /* Bottom Divider */
        .divider-heading {
            font-size: 18px;
            font-weight: 500;
            color: #333;
            margin-top: 30px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        
        /* Simulating the selected options from the image */
        /* Assuming '找兴趣搭子' and '婚恋' are selected in the image */
        #purpose1:checked + label { background-color: #e6e6e6; border-color: #e6e6e6; }
        #purpose4:checked + label { background-color: #e6e6e6; border-color: #e6e6e6; }

    </style>
</head>
<body>

    <div class="phone-screen">
        <div class="notch"></div>
        
        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-bar-left">12:00</div>
            <div class="status-bar-right">
                <span style="font-size: 12px;">📶</span>
                <span><i style="font-style: normal;">三</i></span>
                <span style="font-size: 14px;">🔋</span>
            </div>
        </div>

        <!-- Header: Avatar and AI Button -->
        <div class="header">
            <!-- Used a placeholder image for the AI avatar -->
            <img src="placeholder_avatar.png" alt="AI Cartoon Avatar" class="avatar">
            <button class="ai-button">AI卡通</button>
        </div>

        <!-- Form Content -->
        <div class="form-content">
            
            <!-- 昵称 Nickname -->
            <div class="form-group">
                <label for="nickname" class="form-label">昵称*</label>
                <input type="text" id="nickname" class="form-input" placeholder="">
            </div>

            <!-- 年龄 Age -->
            <div class="form-group">
                <label for="age" class="form-label">年龄*</label>
                <input type="number" id="age" class="form-input" placeholder="">
            </div>

            <!-- 身高 Height -->
            <div class="form-group">
                <label for="height" class="form-label">身高*</label>
                <input type="number" id="height" class="form-input" placeholder="">
            </div>

            <!-- 常驻地 Permanent Residence -->
            <div class="form-group">
                <label class="form-label">常驻地*</label>
                <div class="location-select">
                    <div class="location-button">省份</div>
                    <div class="location-button">城市</div>
                    <div class="location-button">地区</div>
                </div>
            </div>

            <!-- 性别 Gender -->
            <div class="form-group">
                <label class="form-label">性别*</label>
                <div class="gender-select">
                    <input type="radio" id="gender_male" name="gender" value="male" checked>
                    <label for="gender_male">男</label>

                    <input type="radio" id="gender_female" name="gender" value="female">
                    <label for="gender_female">女</label>

                    <input type="radio" id="gender_any" name="gender" value="any">
                    <label for="gender_any">不限</label>
                </div>
            </div>
            
            <!-- 约会目的 Dating Purpose -->
            <div class="form-group">
                <div class="purpose-group-header">
                    <label class="form-label">约会目的 (可多选) *</label>
                    <p>多选目的可扩大匹配范围，但需补充更多信息哦!</p>
                </div>
                
                <div class="purpose-select">
                    <!-- Checkboxes are used since it is '可多选' (multiple choice) -->
                    <input type="checkbox" id="purpose1" name="purpose" value="hobby" checked>
                    <label for="purpose1">找兴趣搭子</label>

                    <input type="checkbox" id="purpose2" name="purpose" value="singledom">
                    <label for="purpose2">脱单</label>

                    <input type="checkbox" id="purpose3" name="purpose" value="dating">
                    <label for="purpose3">Dating</label>

                    <input type="checkbox" id="purpose4" name="purpose" value="marriage" checked>
                    <label for="purpose4">婚恋</label>
                </div>
                
                <p class="disclaimer">
                    *若选择「婚恋」，需验证学历/资产才支持发布盲盒
                </p>
            </div>

            <!-- 对象属性 Partner Attributes -->
            <div class="form-group">
                <h3 class="divider-heading">对象属性</h3>
                <!-- Content below this point is cut off in the original image -->
            </div>

        </div>
    </div>

</body>
</html>
